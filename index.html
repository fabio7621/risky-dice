<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>No.025 風險骰子 — Risky Dice</title>
<style>
  :root{
    --gold:#d9b45c; --gold-dim:#9a7d3a; --ink:#f3e9d2;
    --felt:#0d3b2e; --bad:#c0392b;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#071f18;
    font-family:"Noto Serif TC","PMingLiU","Songti TC",serif;color:var(--ink);}
  #scene{position:fixed;inset:0;cursor:grab;touch-action:none;}
  #scene.dragging{cursor:grabbing;}

  /* ── 卡片式標題牌 ── */
  #plaque{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    text-align:center;pointer-events:none;user-select:none;
    padding:10px 26px 12px;
    border:1px solid rgba(217,180,92,.55);
    border-radius:4px;
    background:linear-gradient(180deg,rgba(10,30,24,.85),rgba(7,22,17,.85));
    box-shadow:0 0 0 3px rgba(7,22,17,.6),0 6px 24px rgba(0,0,0,.5);
  }
  #plaque .no{font-size:11px;letter-spacing:.45em;color:var(--gold-dim);}
  #plaque h1{font-size:22px;letter-spacing:.3em;color:var(--gold);font-weight:700;margin:2px 0 1px;text-indent:.3em;}
  #plaque .sub{font-size:11px;letter-spacing:.2em;color:rgba(243,233,210,.55);}

  /* ── 操作提示 ── */
  #hint{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    font-size:13px;letter-spacing:.25em;color:rgba(243,233,210,.6);
    pointer-events:none;user-select:none;transition:opacity .6s;text-indent:.25em;text-align:center;
  }
  #hint.hide{opacity:0;}

  /* ── 底部控制列 ── */
  #bar{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    display:flex;gap:14px;align-items:center;
  }
  button{
    font-family:inherit;font-size:15px;letter-spacing:.35em;text-indent:.35em;
    color:var(--gold);background:rgba(10,30,24,.8);
    border:1px solid rgba(217,180,92,.6);border-radius:3px;
    padding:10px 22px;cursor:pointer;transition:.2s;
  }
  button:hover{background:rgba(217,180,92,.15);box-shadow:0 0 18px rgba(217,180,92,.25);}
  button:active{transform:scale(.96);}
  button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* ── 計數器 ── */
  #tally{
    position:fixed;top:16px;right:16px;font-size:13px;line-height:1.9;
    letter-spacing:.15em;text-align:right;user-select:none;
    color:rgba(243,233,210,.75);
  }
  #tally b{font-size:17px;}
  #tally .g b{color:var(--gold);}
  #tally .b b{color:#e06050;}

  /* ── 結果橫幅 ── */
  #banner{
    position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(.6);
    font-size:min(18vw,110px);font-weight:900;letter-spacing:.15em;text-indent:.15em;
    opacity:0;pointer-events:none;user-select:none;white-space:nowrap;
    transition:opacity .25s, transform .45s cubic-bezier(.2,1.6,.4,1);
  }
  #banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  #banner.good{color:var(--gold);text-shadow:0 0 30px rgba(255,215,120,.9),0 0 90px rgba(255,190,60,.5);}
  #banner.mid{color:#e8d9a0;text-shadow:0 0 26px rgba(232,217,160,.85),0 0 70px rgba(210,190,120,.4);}
  #banner.small{color:#cfe3d5;text-shadow:0 0 22px rgba(207,227,213,.75),0 0 60px rgba(160,200,175,.35);}
  #banner.bad{color:var(--bad);text-shadow:0 0 30px rgba(255,60,40,.9),0 0 90px rgba(160,0,0,.6);}

  /* ── 凶：全螢幕紅閃 ── */
  #flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(140,0,0,.55),rgba(60,0,0,.85));
    opacity:0;pointer-events:none;transition:opacity .25s;}
  #flash.on{opacity:1;}

  @media (prefers-reduced-motion: reduce){
    #banner{transition:opacity .2s;}
  }
  @media (max-width:480px){
    #plaque h1{font-size:17px;}
    button{font-size:13px;padding:9px 16px;}
    #hint{bottom:88px;font-size:12px;}
  }
</style>
</head>
<body>
<div id="scene"></div>
<div id="flash"></div>

<div id="plaque">
  <div class="no">No.025 ── B ── 30</div>
  <h1>風險骰子</h1>
  <div class="sub">十九面大吉．一面大凶</div>
</div>

<div id="tally">
  <div class="g">大吉 <b id="c0">0</b></div>
  <div class="g">中吉 <b id="c1">0</b></div>
  <div class="g">小吉 <b id="c2">0</b></div>
  <div class="b">大凶 <b id="c3">0</b></div>
</div>

<div id="hint">抓住骰子拖曳，甩動放開即擲出</div>
<div id="banner"></div>

<div id="bar">
  <button id="rollBtn">擲　骰</button>
  <button id="resetBtn">歸　位</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
/* ============================================================
   No.025 風險骰子 リスキーダイス
   正二十面體 d20．簡化剛體物理（衝量式頂點碰撞）
   ============================================================ */
const V3 = THREE.Vector3, Q4 = THREE.Quaternion;
const UP = new V3(0,1,0);
// 面配置：13 面大吉、3 面中吉、3 面小吉、1 面大凶
const TIERS = [
  {name:'大吉', cls:'good',  ink:'#3f2a08', glow:'rgba(60,35,0,.8)'},
  {name:'中吉', cls:'mid',   ink:'#4a3a12', glow:'rgba(70,50,10,.7)'},
  {name:'小吉', cls:'small', ink:'#41402a', glow:'rgba(60,60,30,.6)'},
  {name:'大凶', cls:'bad',   ink:'#7e0d0d', glow:'rgba(255,30,0,.95)'}
];
const FACE_TIER = new Array(20).fill(0);
FACE_TIER[13] = 3;                     // 大凶
[2,7,16].forEach(f=>FACE_TIER[f]=1);   // 中吉
[4,10,18].forEach(f=>FACE_TIER[f]=2);  // 小吉
const R = 1;                   // 骰子外接球半徑
const FLOOR = 0;
const BOUND_X = 5.2, BOUND_Z = 4.2;
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- 基本場景 ---------- */
const container = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06120d, 0.045);

const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, .1, 100);
const CAM_BASE = new V3(0, 6.4, 9.2);
camera.position.copy(CAM_BASE);
camera.lookAt(0,0.6,0);

/* ---------- 燈光 ---------- */
scene.add(new THREE.HemisphereLight(0x3a5c4c, 0x0a1410, .7));

const key = new THREE.DirectionalLight(0xffe9c0, 1.15);
key.position.set(4,9,5);
key.castShadow = true;
key.shadow.mapSize.set(1024,1024);
key.shadow.camera.left=-8; key.shadow.camera.right=8;
key.shadow.camera.top=8;  key.shadow.camera.bottom=-8;
scene.add(key);

const rim = new THREE.PointLight(0x66ffcc, .5, 30);
rim.position.set(-6,4,-6);
scene.add(rim);

const underGlow = new THREE.PointLight(0xd9b45c, .0, 8);  // 骰子腳下的呼吸光
underGlow.position.set(0,.4,0);
scene.add(underGlow);

/* ---------- 賭場絨布桌面 ---------- */
function feltTexture(){
  const c = document.createElement('canvas'); c.width=c.height=1024;
  const g = c.getContext('2d');
  const rad = g.createRadialGradient(512,512,60,512,512,540);
  rad.addColorStop(0,'#14523e'); rad.addColorStop(.65,'#0d3b2e'); rad.addColorStop(1,'#07231b');
  g.fillStyle = rad; g.fillRect(0,0,1024,1024);
  // 絨布噪點
  for(let i=0;i<9000;i++){
    g.fillStyle = 'rgba(255,255,255,'+(Math.random()*.02)+')';
    g.fillRect(Math.random()*1024, Math.random()*1024, 1, 1);
  }
  // 金色裝飾環
  g.strokeStyle='rgba(217,180,92,.4)'; g.lineWidth=3;
  g.beginPath(); g.arc(512,512,300,0,Math.PI*2); g.stroke();
  g.strokeStyle='rgba(217,180,92,.18)'; g.lineWidth=14;
  g.beginPath(); g.arc(512,512,322,0,Math.PI*2); g.stroke();
  g.strokeStyle='rgba(217,180,92,.25)'; g.lineWidth=1.5;
  g.beginPath(); g.arc(512,512,340,0,Math.PI*2); g.stroke();
  const t = new THREE.CanvasTexture(c);
  return t;
}
const table = new THREE.Mesh(
  new THREE.CircleGeometry(15, 64),
  new THREE.MeshStandardMaterial({map:feltTexture(), roughness:.95, metalness:0})
);
table.rotation.x = -Math.PI/2;
table.receiveShadow = true;
scene.add(table);

/* ---------- 骰面貼圖：吉 / 凶 ---------- */
function faceTexture(tierIdx){
  const tier = TIERS[tierIdx], bad = (tierIdx === 3);
  const c = document.createElement('canvas'); c.width=c.height=256;
  const g = c.getContext('2d');
  const rad = g.createRadialGradient(128,120,10,128,128,190);
  if(bad){ rad.addColorStop(0,'#caa14e'); rad.addColorStop(.7,'#9c7326'); rad.addColorStop(1,'#5e3d14'); }
  else   { rad.addColorStop(0,'#e8c979'); rad.addColorStop(.7,'#c49a3e'); rad.addColorStop(1,'#7a5a1e'); }
  g.fillStyle = rad; g.fillRect(0,0,256,256);
  // 金屬刮痕
  g.globalAlpha=.08;
  for(let i=0;i<26;i++){
    g.strokeStyle = Math.random()>.5 ? '#fff':'#000';
    g.beginPath();
    const y = Math.random()*256;
    g.moveTo(0,y); g.lineTo(256, y+(Math.random()*40-20));
    g.stroke();
  }
  g.globalAlpha=1;
  // 直排兩字刻在三角形內（UV 三角形：頂點在上、底邊在下，上窄下寬）
  g.textAlign='center'; g.textBaseline='middle';
  g.font='900 56px "Noto Serif TC","PMingLiU",serif';
  g.shadowColor = tier.glow; g.shadowBlur = bad ? 22 : 6;
  g.fillStyle = tier.ink;
  tier.name.split('').forEach((ch,i)=>{
    const y = 108 + i*64;                 // 第一字較靠頂點、第二字在寬處
    g.save();                             // 亮邊：做出陰刻立體感
    g.shadowBlur=0; g.fillStyle='rgba(255,240,190,.55)';
    g.fillText(ch, 130, y+3);
    g.restore();
    g.fillText(ch, 128, y);
  });
  const t = new THREE.CanvasTexture(c);
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}

/* ---------- 建立 d20 幾何：每面獨立材質群組 + UV ---------- */
const geo = new THREE.IcosahedronGeometry(R,0).toNonIndexed();
geo.clearGroups();
{
  const uv = new Float32Array(20*3*2);
  for(let f=0; f<20; f++){
    geo.addGroup(f*3, 3, f);
    // 每個三角形貼滿同一張貼圖
    const o = f*6;
    uv[o+0]=0.50; uv[o+1]=0.96;   // 頂
    uv[o+2]=0.06; uv[o+3]=0.18;   // 左下
    uv[o+4]=0.94; uv[o+5]=0.18;   // 右下
  }
  geo.setAttribute('uv', new THREE.BufferAttribute(uv,2));
}
geo.computeVertexNormals();

// 每面「局部空間」法向量（結果判定用）
const localNormals = [];
{
  const p = geo.attributes.position;
  const a=new V3(), b=new V3(), cc=new V3(), ab=new V3(), ac=new V3();
  for(let f=0; f<20; f++){
    a.fromBufferAttribute(p, f*3);
    b.fromBufferAttribute(p, f*3+1);
    cc.fromBufferAttribute(p, f*3+2);
    ab.subVectors(b,a); ac.subVectors(cc,a);
    localNormals.push(new V3().crossVectors(ab,ac).normalize());
  }
}

// 頂點（局部空間、去重）— 碰撞用
const localVerts = [];
{
  const p = geo.attributes.position, seen = new Set();
  for(let i=0;i<p.count;i++){
    const v = new V3().fromBufferAttribute(p,i);
    const k = v.x.toFixed(3)+','+v.y.toFixed(3)+','+v.z.toFixed(3);
    if(!seen.has(k)){ seen.add(k); localVerts.push(v); }
  }
}

const materials = [];
for(let f=0; f<20; f++){
  const tier = FACE_TIER[f];
  materials.push(new THREE.MeshStandardMaterial({
    map: faceTexture(tier),
    metalness:.55, roughness:.38,
    emissive: tier===3 ? 0x330000 : 0x1a1206,
    emissiveIntensity:.5
  }));
}
const dice = new THREE.Mesh(geo, materials);
dice.castShadow = true;
scene.add(dice);

// 金色稜線
const edges = new THREE.LineSegments(
  new THREE.EdgesGeometry(geo),
  new THREE.LineBasicMaterial({color:0x5e4416, transparent:true, opacity:.9})
);
dice.add(edges);

/* ---------- 簡化剛體物理 ---------- */
const body = {
  pos:new V3(0,R+0.02,0), vel:new V3(),
  quat:new Q4().setFromEuler(new THREE.Euler(.4,.2,.1)),
  omega:new V3(),                 // 角速度（世界座標）
  mass:1, restitution:.38, friction:.35,
  invInertia: 2.5 / (R*R)         // 近似球體 I=2/5 m r² 的倒數
};
const GRAVITY = -22;              // 稍大重力，手感更俐落
let sleeping = true, settleTimer = 0, snapping = null, rollingHot = false;

const _r=new V3(), _vp=new V3(), _imp=new V3(), _tq=new V3(), _wq=new Q4();

function stepPhysics(dt){
  if(sleeping) return;
  body.vel.y += GRAVITY*dt;
  body.pos.addScaledVector(body.vel, dt);

  // 四元數積分：dq = ½ ω q dt
  _wq.set(body.omega.x, body.omega.y, body.omega.z, 0).multiply(body.quat);
  body.quat.x += _wq.x*.5*dt; body.quat.y += _wq.y*.5*dt;
  body.quat.z += _wq.z*.5*dt; body.quat.w += _wq.w*.5*dt;
  body.quat.normalize();

  // 隱形圍欄（不讓骰子飛出鏡頭）
  if(Math.abs(body.pos.x) > BOUND_X){ body.pos.x = Math.sign(body.pos.x)*BOUND_X; body.vel.x *= -.55; }
  if(Math.abs(body.pos.z) > BOUND_Z){ body.pos.z = Math.sign(body.pos.z)*BOUND_Z; body.vel.z *= -.55; }

  // 頂點 × 地板：衝量碰撞
  let deepest = 0, impactPower = 0; const contact = new V3();
  for(const lv of localVerts){
    _r.copy(lv).applyQuaternion(body.quat);          // 質心 → 頂點
    const wy = body.pos.y + _r.y;
    if(wy < FLOOR){
      const pen = FLOOR - wy;
      if(pen > deepest){ deepest = pen; contact.copy(_r).add(body.pos); }
      // 接觸點速度 = v + ω × r
      _vp.copy(body.omega).cross(_r).add(body.vel);
      if(_vp.y < 0){
        // 法向衝量（含轉動慣量影響）
        _tq.copy(_r).cross(UP);                       // r × n
        const angTerm = _tq.lengthSq() * body.invInertia;
        const j = -(1+body.restitution) * _vp.y / (1/body.mass + angTerm);
        _imp.set(0,j,0);
        // 切向摩擦
        const tv = new V3(_vp.x,0,_vp.z);
        if(tv.lengthSq() > 1e-6){
          tv.normalize().multiplyScalar(-j*body.friction);
          _imp.add(tv);
        }
        body.vel.addScaledVector(_imp, 1/body.mass);
        _tq.copy(_r).cross(_imp);
        body.omega.addScaledVector(_tq, body.invInertia);
        impactPower = Math.max(impactPower, j);
      }
    }
  }
  if(deepest > 0) body.pos.y += deepest;              // 位置修正
  if(impactPower > 1.6) onImpact(contact, impactPower);

  // 阻尼
  body.omega.multiplyScalar(1 - .35*dt);
  body.vel.x *= (1 - .12*dt); body.vel.z *= (1 - .12*dt);

  // 靜止判定
  const onGround = body.pos.y < R*0.92;
  if(onGround && body.vel.length() < .35 && body.omega.length() < .8){
    settleTimer += dt;
    if(settleTimer > .35) beginSnap();
  } else settleTimer = 0;
}

/* ---------- 靜止後：轉正 + 判定結果 ---------- */
function topFace(){
  let best=-2, idx=0; const n=new V3();
  for(let f=0; f<20; f++){
    n.copy(localNormals[f]).applyQuaternion(body.quat);
    if(n.y > best){ best=n.y; idx=f; }
  }
  return idx;
}
function beginSnap(){
  sleeping = true;
  const f = topFace();
  const n = localNormals[f].clone().applyQuaternion(body.quat);
  const dq = new Q4().setFromUnitVectors(n, UP);
  snapping = {
    from: body.quat.clone(),
    to: dq.multiply(body.quat).normalize(),
    t: 0, face: f,
    y0: body.pos.y
  };
}
let wasThrown = false;   // 「輕放」不算一次擲骰
function finishRoll(face){
  if(wasThrown) showResult(FACE_TIER[face]);
  wasThrown = false;
}

/* ---------- 粒子系統（共用池）---------- */
function makeParticles(count, size, color){
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(count*3),3));
  const m = new THREE.PointsMaterial({
    color, size, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true
  });
  const pts = new THREE.Points(g,m);
  pts.userData = {vel:new Float32Array(count*3), life:new Float32Array(count), active:false};
  scene.add(pts);
  return pts;
}
const sparks   = makeParticles(40,  .07, 0xffd97a);   // 碰撞火花
const burstG   = makeParticles(160, .12, 0xffcf5e);   // 大吉爆發
const burstB   = makeParticles(160, .12, 0xff3822);   // 大凶爆發
const ambient  = makeParticles(90,  .05, 0x86ffcf);   // 環境浮塵

// 環境浮塵初始化（永久漂浮）
{
  const p = ambient.geometry.attributes.position.array;
  for(let i=0;i<90;i++){
    p[i*3]=(Math.random()-.5)*16; p[i*3+1]=Math.random()*6+.3; p[i*3+2]=(Math.random()-.5)*12;
  }
  ambient.material.opacity=.35;
  ambient.geometry.attributes.position.needsUpdate=true;
}

function emit(sys, origin, speed, upBias, life){
  const p = sys.geometry.attributes.position.array;
  const u = sys.userData;
  const n = u.life.length;
  for(let i=0;i<n;i++){
    p[i*3]=origin.x; p[i*3+1]=origin.y; p[i*3+2]=origin.z;
    const a = Math.random()*Math.PI*2, e = Math.random();
    const s = speed*(.4+Math.random()*.6);
    u.vel[i*3]   = Math.cos(a)*s*(1-e*.4);
    u.vel[i*3+1] = upBias*s*e + speed*.25;
    u.vel[i*3+2] = Math.sin(a)*s*(1-e*.4);
    u.life[i]    = life*(.5+Math.random()*.5);
  }
  u.active=true; u.maxLife=life;
  sys.material.opacity=1;
  sys.geometry.attributes.position.needsUpdate=true;
}
function updateParticles(sys, dt, gravity){
  const u=sys.userData; if(!u.active) return;
  const p=sys.geometry.attributes.position.array;
  let alive=0;
  for(let i=0;i<u.life.length;i++){
    if(u.life[i]<=0) continue;
    u.life[i]-=dt; if(u.life[i]>0) alive++;
    u.vel[i*3+1]+=gravity*dt;
    p[i*3]+=u.vel[i*3]*dt; p[i*3+1]+=u.vel[i*3+1]*dt; p[i*3+2]+=u.vel[i*3+2]*dt;
    if(p[i*3+1]<.02){ p[i*3+1]=.02; u.vel[i*3+1]*=-.4; }
  }
  sys.material.opacity = Math.max(0, sys.material.opacity - dt*.9);
  sys.geometry.attributes.position.needsUpdate=true;
  if(!alive){ u.active=false; sys.material.opacity=0; }
}

/* ---------- 結果光環 ---------- */
const ring = new THREE.Mesh(
  new THREE.RingGeometry(.9,1.05,64),
  new THREE.MeshBasicMaterial({color:0xffd97a, transparent:true, opacity:0, side:THREE.DoubleSide,
    blending:THREE.AdditiveBlending, depthWrite:false})
);
ring.rotation.x=-Math.PI/2; ring.position.y=.02;
scene.add(ring);
let ringT = -1;

/* ---------- 音效（極簡合成器）---------- */
let actx=null;
function audio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended')actx.resume(); return actx; }
function tick(freq, dur, gain, type){
  const a=audio(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'triangle'; o.frequency.value=freq;
  g.gain.setValueAtTime(gain, a.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001, a.currentTime+dur);
  o.connect(g).connect(a.destination);
  o.start(); o.stop(a.currentTime+dur);
}
function chime(tier){
  if(tier===3){ tick(72,.9,.16,'sawtooth'); setTimeout(()=>tick(54,1.1,.14,'sawtooth'),140); return; }
  const notes = [[660,880,1320],[660,880],[660]][tier];   // 吉的等級越高音越華麗
  notes.forEach((f,i)=>setTimeout(()=>tick(f,.5,.08),i*110));
}

/* ---------- 事件反饋 ---------- */
let shakeT = 0, shakeAmp = 0;
function onImpact(point, power){
  emit(sparks, point, Math.min(power*.9,4), 1.4, .45);
  tick(180+Math.random()*120, .08, Math.min(power*.02,.06));
}

const banner = document.getElementById('banner');
const flash  = document.getElementById('flash');
const counts = [0,0,0,0];
const RING_COLORS = [0xffd97a, 0xe8d9a0, 0xcfe3d5, 0xff3822];
const BURST = [{s:4.2,l:1.6},{s:3,l:1.2},{s:2.1,l:.9}];   // 吉的等級越高爆得越大

function showResult(tier){
  const at = dice.position.clone(); at.y += .6;
  const info = TIERS[tier];
  counts[tier]++;
  document.getElementById('c'+tier).textContent = counts[tier];
  banner.textContent = info.name[0] + '　' + info.name[1];
  banner.className = 'show ' + info.cls;
  ring.material.color.set(RING_COLORS[tier]);
  ring.position.x = dice.position.x; ring.position.z = dice.position.z;
  ringT = 0;
  if(tier===3){
    emit(burstB, at, 5, 1.8, 1.4);
    flash.classList.add('on');
    if(!reduceMotion){ shakeT=.7; shakeAmp=.22; }
    setTimeout(()=>flash.classList.remove('on'), 900);
  }else{
    const p = BURST[tier];
    emit(burstG, at, p.s, 2.2, p.l);
  }
  chime(tier);
  setTimeout(()=>banner.classList.remove('show'), 1700);
}

/* ---------- 擲骰 ---------- */
const hint = document.getElementById('hint');
function throwDice(vx, vy, vz){
  hint.classList.add('hide');
  banner.classList.remove('show');
  snapping = null; sleeping = false; settleTimer = 0; wasThrown = true;
  if(body.pos.y < R) body.pos.y = R + .35;
  body.vel.set(vx, vy, vz);
  body.omega.set(
    (Math.random()-.5)*2 - vz*1.6,
    (Math.random()-.5)*6,
    (Math.random()-.5)*2 + vx*1.6
  );
  const spin = 6 + Math.min(Math.hypot(vx,vz)*1.4, 10);
  body.omega.normalize().multiplyScalar(spin);
  audio();
}
document.getElementById('rollBtn').addEventListener('click', ()=>{
  const a = Math.random()*Math.PI*2, s = 3+Math.random()*3;
  body.pos.set((Math.random()-.5)*2, 3.2+Math.random(), (Math.random()-.5)*1.5);
  throwDice(Math.cos(a)*s, 2+Math.random()*2, Math.sin(a)*s*.7);
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  sleeping = true; snapping = null;
  body.pos.set(0, R+0.02, 0); body.vel.set(0,0,0); body.omega.set(0,0,0);
  banner.classList.remove('show');
});

/* ---------- 抓取骰子（Raycaster 命中 → 懸空拖曳 → 世界座標甩出）---------- */
const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();
// 比骰子大一圈的隱形抓取範圍，手指粗一點也抓得到
const grabSphere = new THREE.Mesh(
  new THREE.SphereGeometry(R*1.9, 8, 8),
  new THREE.MeshBasicMaterial({visible:false})
);
scene.add(grabSphere);
const HOLD_Y = 2.1;                                        // 抓著時的懸浮高度
const holdPlane = new THREE.Plane(new V3(0,1,0), -HOLD_Y); // 平面 y = HOLD_Y
let held = false;
const holdTarget = new V3();
let samples = [];                                          // 世界座標位置取樣（算甩出速度用）
const _hp = new V3(), _mv = new V3(), _hq = new Q4();

function ndcFromEvent(e){
  pointerNDC.x =  (e.clientX/innerWidth)*2 - 1;
  pointerNDC.y = -(e.clientY/innerHeight)*2 + 1;
}

container.addEventListener('pointerdown', e=>{
  audio();
  ndcFromEvent(e);
  raycaster.setFromCamera(pointerNDC, camera);
  grabSphere.position.copy(body.pos);
  if(raycaster.intersectObject(grabSphere).length === 0) return;  // 沒點到骰子
  held = true; sleeping = true; snapping = null;
  container.classList.add('dragging');
  container.setPointerCapture(e.pointerId);
  holdTarget.copy(body.pos); holdTarget.y = HOLD_Y;
  samples = [{p: body.pos.clone(), t: performance.now()}];
  hint.classList.add('hide');
  banner.classList.remove('show');
});

container.addEventListener('pointermove', e=>{
  if(!held) return;
  ndcFromEvent(e);
  raycaster.setFromCamera(pointerNDC, camera);
  if(raycaster.ray.intersectPlane(holdPlane, holdTarget)){
    holdTarget.y = HOLD_Y;
    holdTarget.x = THREE.MathUtils.clamp(holdTarget.x, -BOUND_X, BOUND_X);
    holdTarget.z = THREE.MathUtils.clamp(holdTarget.z, -BOUND_Z, BOUND_Z);
  }
});

function releaseDice(){
  if(!held) return;
  held = false; container.classList.remove('dragging');
  // 取「最近約 120ms」的位移換算世界座標速度，避免整段拖曳平均掉甩勁
  const now = performance.now();
  let old = samples[0];
  for(const s of samples){ if(now - s.t <= 120){ old = s; break; } }
  const dt = Math.max((now - old.t)/1000, .016);
  const v = new V3().subVectors(body.pos, old.p).divideScalar(dt);
  const speed = Math.hypot(v.x, v.z);
  if(speed > 1.2){
    const cap = Math.min(speed, 11)/speed;                 // 上限：別甩到穿牆
    throwDice(v.x*cap, 2.2 + Math.min(speed*.35, 4.5), v.z*cap);
  }else{
    // 輕放：讓它自然落下，不算一次擲骰
    wasThrown = false; sleeping = false; settleTimer = 0;
    body.vel.set(v.x*.4, -1, v.z*.4);
    body.omega.multiplyScalar(.5);
  }
}
container.addEventListener('pointerup', releaseDice);
container.addEventListener('pointercancel', releaseDice);

/* ---------- 主迴圈 ---------- */
const clock = new THREE.Clock();
let acc=0; const FIXED=1/120;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;

  // 固定步長物理
  acc += dt;
  while(acc >= FIXED){ stepPhysics(FIXED); acc -= FIXED; }

  // 被抓著時：平滑跟隨滑鼠 + 依移動方向緩慢滾動
  if(held && dt > 0){
    _hp.copy(body.pos);
    body.pos.lerp(holdTarget, 1 - Math.pow(.0005, dt));    // 幀率無關的平滑跟隨
    _mv.subVectors(body.pos, _hp);
    body.omega.set(_mv.z, 0, -_mv.x).multiplyScalar(.9/Math.max(dt,.001));
    if(body.omega.length() > 7) body.omega.setLength(7);
    _hq.set(body.omega.x, body.omega.y, body.omega.z, 0).multiply(body.quat);
    body.quat.x += _hq.x*.5*dt; body.quat.y += _hq.y*.5*dt;
    body.quat.z += _hq.z*.5*dt; body.quat.w += _hq.w*.5*dt;
    body.quat.normalize();
    samples.push({p: body.pos.clone(), t: performance.now()});
    if(samples.length > 10) samples.shift();
  }

  // 轉正動畫
  if(snapping){
    snapping.t += dt*3.2;
    const k = Math.min(snapping.t, 1);
    const e = 1-Math.pow(1-k,3);
    body.quat.copy(snapping.from).slerp(snapping.to, e);
    body.pos.y = snapping.y0 + (R*0.755 - snapping.y0)*e;  // 面貼地的質心高度（內切球半徑）
    body.pos.y = Math.max(body.pos.y, R*0.7);
    if(k>=1){ const f=snapping.face; snapping=null; finishRoll(f); }
  }

  dice.position.copy(body.pos);
  dice.quaternion.copy(body.quat);

  // 滾動中的殘光粒子
  rollingHot = !sleeping && body.omega.length() > 4;
  if(rollingHot && Math.random()<.35){
    emit(sparks, dice.position, 1.2, .8, .3);
  }

  // 腳下呼吸光
  underGlow.position.x = body.pos.x; underGlow.position.z = body.pos.z;
  underGlow.intensity = sleeping ? (.6+Math.sin(t*2.2)*.25) : 1.1;

  // 光環擴散
  if(ringT>=0){
    ringT += dt;
    const s = 1 + ringT*5;
    ring.scale.set(s,s,s);
    ring.material.opacity = Math.max(0, .8 - ringT*.9);
    if(ringT>1.2) ringT=-1;
  }

  // 環境浮塵緩慢漂浮
  {
    const p = ambient.geometry.attributes.position.array;
    for(let i=0;i<90;i++){
      p[i*3+1] += Math.sin(t*.6+i)*.0016;
      p[i*3]   += Math.cos(t*.4+i*1.7)*.0012;
    }
    ambient.material.opacity = .3+Math.sin(t*.8)*.1;
    ambient.geometry.attributes.position.needsUpdate = true;
  }

  updateParticles(sparks, dt, -9);
  updateParticles(burstG, dt, -3.5);
  updateParticles(burstB, dt, -3.5);

  // 鏡頭：待機微晃 + 大凶震動
  let sx=0, sy=0;
  if(shakeT>0){
    shakeT-=dt;
    sx=(Math.random()-.5)*shakeAmp*shakeT;
    sy=(Math.random()-.5)*shakeAmp*shakeT;
  }
  camera.position.x = CAM_BASE.x + Math.sin(t*.3)*.5 + sx;
  camera.position.y = CAM_BASE.y + Math.sin(t*.5)*.15 + sy;
  camera.position.z = CAM_BASE.z + Math.cos(t*.25)*.3;
  camera.lookAt(dice.position.x*.4, .6, dice.position.z*.4);

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
})();
</script>
